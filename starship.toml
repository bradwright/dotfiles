"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$python\
$character"""

[directory]
style = "green"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
format = "[$branch]($style)"
# base01 (#586e75) ‚Äî bright-black is invisible (same as background in solarized dark)
style = "bright-green"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](blue) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-green"

[python]
format = "[$virtualenv]($style) "
style = "bright-green"
detect_extensions = []
detect_files = []

[nodejs]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]
detect_extensions = []

[swift]
disabled = true

[package]
disabled = true
